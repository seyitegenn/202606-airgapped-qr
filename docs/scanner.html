<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <script src="https://cdn.tailwindcss.com"></script>
  </head>

  <body>
    <div id="app">
      <div class="flex flex-col w-full items-center justify-center">

        <div class="text-xl my-4">Data Receiver Mode</div>
        <div class="text-sm mb-4 text-center px-4">{{user_message}}</div>

        <!-- Hata mesajı -->
        <div v-if="camera_error" class="w-full max-w-lg mb-4 px-4 py-3 bg-red-50 border border-red-300 rounded text-sm text-red-700 text-center">
          <div class="font-medium mb-1">Kamera açılamadı</div>
          <div class="text-xs">{{camera_error}}</div>
          <div class="text-xs mt-2 text-red-500">
            Dosyayı <span class="font-mono">file://</span> veya <span class="font-mono">https://</span> üzerinden açın.
            <span class="font-mono">content://</span> şeması kamera erişimine izin vermiyor.
          </div>
        </div>

        <div v-if="!camera_error" class="text-sm mb-4">
          İlerleme: {{Object.keys(decoded_chunks).length}} / {{file_metadata.chunks || 0}}
        </div>

        <button
          v-if="!is_receiving"
          v-on:click="start_receiver"
          :disabled="is_transitioning || !!camera_error"
          class="mb-6 p-1 border-2 border-gray-500 disabled:opacity-40 disabled:cursor-not-allowed"
        >
          {{is_transitioning ? 'Başlatılıyor...' : 'Start Receiver'}}
        </button>
        <button
          v-else
          v-on:click="stop_receiver"
          :disabled="is_transitioning"
          class="mb-6 p-1 border-2 border-gray-500 disabled:opacity-40 disabled:cursor-not-allowed"
        >
          Stop Receiver
        </button>

        <!-- Eksik chunk accordion -->
        <div v-if="file_metadata.chunks && missing_chunks.length > 0" class="w-full max-w-lg mb-2">
          <button
            v-on:click="missing_open = !missing_open"
            class="w-full flex justify-between items-center border px-3 py-1.5 text-sm bg-gray-50 hover:bg-gray-100"
          >
            <span>Eksik chunk ({{missing_chunks.length}} / {{file_metadata.chunks}})</span>
            <span>{{missing_open ? '▲' : '▼'}}</span>
          </button>
          <div v-show="missing_open" class="border border-t-0 p-2">
            <div class="flex flex-wrap gap-1 max-h-32 overflow-y-auto mb-2">
              <span
                v-for="n in missing_chunks"
                :key="n"
                class="text-xs bg-red-100 border border-red-300 rounded px-1 py-0.5"
              >{{n}}</span>
            </div>
            <button v-on:click="copy_missing" class="text-xs border px-2 py-0.5 hover:bg-gray-50 w-full">Kopyala</button>
          </div>
        </div>

        <video id="videoElement" muted autoplay playsinline class="mb-8 max-w-full"></video>

      </div>
    </div>

    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@undecaf/zbar-wasm@0.11.0/dist/index.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pako/2.0.3/pako.min.js"></script>
    <script>
      const { createApp, ref, reactive, computed } = Vue;

      createApp({
        setup() {
          const user_message = ref('Almaya başlamak için butona tıklayın');
          const decoded_chunks = ref({});
          const file_metadata = reactive({});
          const is_receiving = ref(false);
          const is_transitioning = ref(false);
          const camera_error = ref('');
          const missing_open = ref(false);
          let canvas, context, videoElement, camera_ready = false;

          const missing_chunks = computed(() => {
            if (!file_metadata.chunks) return [];
            const received = new Set(Object.keys(decoded_chunks.value).map(Number));
            return Array.from({ length: file_metadata.chunks }, (_, i) => i).filter(i => !received.has(i));
          });

          const copy_missing = () => {
            navigator.clipboard.writeText(missing_chunks.value.join(','));
            user_message.value = 'Eksik chunk listesi kopyalandı!';
          };

          const init_camera = async () => {
            if (camera_ready) return true;

            if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
              camera_error.value = 'navigator.mediaDevices API bu bağlamda kullanılamıyor. Sayfayı HTTPS veya file:// üzerinden açın.';
              return false;
            }

            try {
              videoElement = document.getElementById('videoElement');
              videoElement.srcObject = await navigator.mediaDevices.getUserMedia({
                video: { facingMode: 'environment' },
              });
              canvas = document.createElement('canvas');
              context = canvas.getContext('2d');
              await new Promise(r => setTimeout(r, 2000));
              canvas.height = videoElement.videoHeight;
              canvas.width = videoElement.videoWidth;
              context.drawImage(videoElement, 0, 0);
              camera_ready = true;
              return true;
            } catch (err) {
              const messages = {
                NotAllowedError: 'Kamera izni reddedildi.',
                NotFoundError: 'Kamera bulunamadı.',
                NotReadableError: 'Kamera başka bir uygulama tarafından kullanılıyor.',
                OverconstrainedError: 'Arka kamera bulunamadı.',
              };
              camera_error.value = messages[err.name] || err.message || 'Bilinmeyen hata.';
              return false;
            }
          };

          const decode_data = (input_string) => {
            const encoded_data = atob(input_string.split(',')[1]);
            const encoded_array = Array.from(encoded_data, (char) => char.charCodeAt(0));
            const utf8Decoder = new TextDecoder();
            const output_string = utf8Decoder.decode(new Uint8Array(encoded_array));
            const data_array = Array.from(output_string, (char) => char.charCodeAt(0));
            return {
              index: parseInt(input_string.split(',')[0]),
              data: data_array,
            };
          };

          const download_file = (data, fileName) => {
            const blob = new Blob([data]);
            const dummy_element = document.createElement('a');
            const url = URL.createObjectURL(blob);
            dummy_element.href = url;
            dummy_element.download = fileName;
            dummy_element.click();
            URL.revokeObjectURL(url);
          };

          const stop_receiver = () => {
            is_receiving.value = false;
            decoded_chunks.value = {};
            Object.keys(file_metadata).forEach(k => delete file_metadata[k]);
            user_message.value = 'Almaya başlamak için butona tıklayın';
            if (videoElement && videoElement.srcObject) {
              videoElement.srcObject.getTracks().forEach(t => t.stop());
              videoElement.srcObject = null;
            }
            camera_ready = false;
          };

          const start_receiver = async () => {
            if (is_transitioning.value || is_receiving.value) return;
            camera_error.value = '';
            is_transitioning.value = true;
            user_message.value = 'Kamera başlatılıyor...';

            const ok = await init_camera();
            is_transitioning.value = false;
            if (!ok) return;

            is_receiving.value = true;
            user_message.value = 'QR kodunu kameraya gösterin...';

            while (file_metadata.chunks != Object.keys(decoded_chunks.value).length) {
              try {
                await new Promise(r => setTimeout(r, 10));
                context.drawImage(videoElement, 0, 0);
                const image_data = context.getImageData(0, 0, canvas.width, canvas.height);
                const symbols = await zbarWasm.scanImageData(image_data);
                if (!symbols || !symbols.length) continue;

                const decoded_data = symbols[0].decode();
                if (decoded_data.includes('chunks')) {
                  const meta = JSON.parse(decoded_data);
                  if (meta.sid !== file_metadata.sid) decoded_chunks.value = {};
                  Object.assign(file_metadata, meta);
                  user_message.value = `Dosya alınıyor: ${file_metadata.name}`;
                } else if (decoded_data.split(',').length == 2) {
                  const raw_data = decode_data(decoded_data);
                  decoded_chunks.value[raw_data['index']] = raw_data['data'];
                }
              } catch (error) {
                console.error('Loop hatası:', error);
              }

              if (!is_receiving.value) {
                user_message.value = 'Almaya başlamak için butona tıklayın';
                return true;
              }
            }

            user_message.value = 'Transfer tamamlandı';
            const output_array = [];
            for (let i = 0; i < file_metadata.chunks; i++) {
              output_array.push(...decoded_chunks.value[i]);
            }
            const output_uint8array = Uint8Array.from(output_array);
            const inflated_array = pako.inflate(output_uint8array);
            download_file(inflated_array, file_metadata.name);
            stop_receiver();
          };

          return {
            user_message,
            camera_error,
            missing_open,
            is_transitioning,
            start_receiver,
            stop_receiver,
            is_receiving,
            file_metadata,
            decoded_chunks,
            missing_chunks,
            copy_missing,
          };
        },
      }).mount('#app');
    </script>
  </body>
</html>
