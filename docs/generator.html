<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <script src="https://cdn.tailwindcss.com"></script>
  </head>

  <body>
    <div id="app">
      <div class="flex min-h-screen">

        <!-- Main content -->
        <div
          class="flex flex-col items-center flex-1 py-4 px-4 relative"
          @dragenter.prevent="on_drag_enter"
          @dragover.prevent
          @dragleave="on_drag_leave"
          @drop.prevent="on_drop"
        >
          <!-- Drag overlay -->
          <div
            v-if="is_dragging"
            class="absolute inset-0 z-50 flex items-center justify-center bg-white/80 border-4 border-dashed border-gray-400 pointer-events-none"
          >
            <span class="text-2xl text-gray-500">Drop the file here</span>
          </div>

          <!-- Hamburger -->
          <button
            v-on:click="settings_open = !settings_open"
            class="absolute top-4 right-4 p-1 text-gray-500 hover:text-gray-800"
            title="Toggle settings"
          >
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
              <line x1="3" y1="6" x2="21" y2="6"/>
              <line x1="3" y1="12" x2="21" y2="12"/>
              <line x1="3" y1="18" x2="21" y2="18"/>
            </svg>
          </button>

          <div class="text-xl mb-4">Generator</div>

          <!-- Settings panel — mobile inline (between title and file input) -->
          <div v-show="settings_open" class="w-full mb-4 md:hidden flex flex-col gap-4 text-sm border-y py-4 bg-gray-50">
            <div>
              <label class="block mb-1 font-medium">Error Correction</label>
              <select v-model="error_correction" :disabled="is_transferring" class="border p-1 w-full bg-white disabled:opacity-50">
                <option value="L">L — Easy Scan</option>
                <option value="M">M — Default</option>
                <option value="Q">Q — Balanced</option>
                <option value="H">H — Robust</option>
              </select>
            </div>
            <div>
              <label class="block mb-1 font-medium">QR Frame Delay</label>
              <div class="flex items-center gap-2">
                <input type="range" v-model.number="chunk_delay_ms" min="20" max="500" step="10" class="flex-1">
                <input type="number" v-model.number="chunk_delay_ms" min="20" max="9999" step="10" class="border p-1 w-20 text-center text-xs">
                <span class="text-gray-500">ms</span>
              </div>
            </div>
            <div>
              <label class="block mb-1 font-medium">Chunk Size</label>
              <div class="flex items-center gap-2">
                <input type="range" v-model.number="chunk_size_config" min="100" max="500" step="50" :disabled="is_transferring" class="flex-1 disabled:opacity-50">
                <span class="text-gray-500 w-14 text-right">{{chunk_size_config}}B</span>
              </div>
              <div v-if="chunk_size_reprocessing" class="text-xs text-blue-500 mt-1">Recalculating...</div>
            </div>
            <div class="border-t pt-4">
              <label class="block mb-1 font-medium">Scanner Link</label>
              <div class="flex items-stretch mb-2">
                <button v-on:click="url_locked = !url_locked" :title="url_locked ? 'Unlock' : 'Lock'" class="border border-r-0 px-1.5 hover:bg-gray-100 text-xs select-none leading-none" :class="url_locked ? 'text-gray-700' : 'text-gray-300'">{{url_locked ? '🔒' : '🔓'}}</button>
                <button v-on:click="reset_scanner_url" title="Reset to default" class="border border-r-0 px-1.5 text-gray-400 hover:text-gray-700 hover:bg-gray-100 text-xs">↺</button>
                <textarea v-model="scanner_url" :readonly="url_locked" placeholder="https://..." rows="2" :class="['border p-1 flex-1 text-xs min-w-0 resize-none leading-tight', url_locked ? 'text-gray-400 bg-gray-50' : 'text-gray-900 bg-white']"></textarea>
              </div>
              <button v-on:click="toggle_scanner_qr" :disabled="!scanner_url.trim()" class="w-full p-1 border-2 border-gray-400 disabled:opacity-40 disabled:cursor-not-allowed">
                {{showing_scanner_qr ? 'Hide QR' : 'Show QR'}}
              </button>
              <div v-if="showing_scanner_qr" class="mt-3 flex flex-col items-center">
                <div id="scanner-qrcode-mobile"></div>
              </div>
            </div>
          </div>

          <!-- File Input -->
          <label class="w-full max-w-md mb-4 flex items-center border border-black cursor-pointer text-sm select-none">
            <span class="px-2 py-1 bg-gray-200 text-gray-700 border-r border-gray-300 shrink-0">Select File</span>
            <span class="px-2 py-1 text-gray-900 truncate" :class="{'text-gray-400': !selected_file}">
              {{selected_file ? selected_file.name : 'No file selected'}}
            </span>
            <input id="file_input" type="file" class="hidden" @change="on_file_selected">
          </label>

          <!-- Action button + chunk selection (same row) -->
          <div class="w-full max-w-md mb-4 flex items-center gap-2">
            <button
              v-if="!is_transferring"
              v-on:click="start_transfer"
              :disabled="!file_loaded"
              class="p-1 border-2 border-gray-500 disabled:opacity-40 disabled:cursor-not-allowed whitespace-nowrap shrink-0"
            >
              Start Transfer
            </button>
            <button
              v-else
              v-on:click="stop_transfer"
              class="p-1 border-2 border-gray-500 whitespace-nowrap shrink-0"
            >
              Stop Transfer
            </button>
            <template v-if="file_loaded">
              <span class="text-xs text-gray-500 whitespace-nowrap shrink-0 font-mono w-20 text-center">
                <template v-if="is_transferring">{{current_chunk_index}}/{{total_chunks_count - 1}}</template>
                <template v-else>{{total_chunks_count}} chunk</template>
              </span>
              <input
                v-model="chunk_range_input"
                :readonly="is_transferring"
                placeholder="range"
                class="border p-1 flex-1 font-mono text-xs min-w-0"
                :class="is_transferring ? 'text-gray-400 bg-gray-50' : ''"
              >
            </template>
          </div>

          <!-- QR Code -->
          <div class="mb-4 p-4 border border-gray-300">
            <div id="qrcode"></div>
          </div>
        </div>

        <!-- Config panel (right sidebar — desktop only) -->
        <div v-show="settings_open" class="hidden md:flex flex-col w-60 shrink-0 border-l bg-gray-50 p-4 gap-5 text-sm">
          <div class="font-medium text-gray-700 border-b pb-2">Settings</div>

          <div>
            <label class="block mb-1 font-medium">Error Correction</label>
            <select v-model="error_correction" :disabled="is_transferring" class="border p-1 w-full bg-white disabled:opacity-50">
              <option value="L">L — Easy Scan</option>
              <option value="M">M — Default</option>
              <option value="Q">Q — Balanced</option>
              <option value="H">H — Robust</option>
            </select>
          </div>

          <div>
            <label class="block mb-1 font-medium">QR Frame Delay</label>
            <div class="flex items-center gap-2">
              <input type="range" v-model.number="chunk_delay_ms" min="20" max="500" step="10" class="flex-1">
              <input type="number" v-model.number="chunk_delay_ms" min="20" max="9999" step="10" class="border p-1 w-20 text-center text-xs">
              <span class="text-gray-500">ms</span>
            </div>
          </div>

          <div>
            <label class="block mb-1 font-medium">Chunk Size</label>
            <div class="flex items-center gap-2">
              <input type="range" v-model.number="chunk_size_config" min="100" max="500" step="50" :disabled="is_transferring" class="flex-1 disabled:opacity-50">
              <span class="text-gray-500 w-14 text-right">{{chunk_size_config}}B</span>
            </div>
            <div v-if="chunk_size_reprocessing" class="text-xs text-blue-500 mt-1">Recalculating...</div>
          </div>

          <div class="border-t pt-4">
            <label class="block mb-1 font-medium">Scanner Link</label>
            <div class="flex items-stretch mb-2">
              <button
                v-on:click="url_locked = !url_locked"
                :title="url_locked ? 'Unlock' : 'Lock'"
                class="border border-r-0 px-1.5 hover:bg-gray-100 text-xs select-none leading-none"
                :class="url_locked ? 'text-gray-700' : 'text-gray-300'"
              >{{url_locked ? '🔒' : '🔓'}}</button>
              <button
                v-on:click="reset_scanner_url"
                title="Reset to default"
                class="border border-r-0 px-1.5 text-gray-400 hover:text-gray-700 hover:bg-gray-100 text-xs"
              >↺</button>
              <textarea
                v-model="scanner_url"
                :readonly="url_locked"
                placeholder="https://..."
                rows="2"
                :class="['border p-1 flex-1 text-xs min-w-0 resize-none leading-tight', url_locked ? 'text-gray-400 bg-gray-50' : 'text-gray-900 bg-white']"
              ></textarea>
            </div>
            <button
              v-on:click="toggle_scanner_qr"
              :disabled="!scanner_url.trim()"
              class="w-full p-1 border-2 border-gray-400 disabled:opacity-40 disabled:cursor-not-allowed"
            >
              {{showing_scanner_qr ? 'Hide QR' : 'Show QR'}}
            </button>
            <div v-if="showing_scanner_qr" class="mt-3 flex flex-col items-center">
              <div id="scanner-qrcode-desktop"></div>
            </div>
          </div>
        </div>

      </div>
    </div>

    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pako/2.0.3/pako.min.js"></script>
    <script>
      const { createApp, ref, watch, onMounted } = Vue;

      createApp({
        setup() {
          const is_transferring = ref(false);
          const current_chunk_index = ref(0);
          const settings_open = ref(window.innerWidth >= 768);

          // Config
          const error_correction = ref('M');
          const chunk_delay_ms = ref(250);
          const chunk_size_config = ref(250);

          // File state
          const compressed_data = ref(null);
          const file_loaded = ref(false);
          const is_dragging = ref(false);
          const total_chunks_count = ref(0);
          const used_chunk_size = ref(250);
          const chunk_range_input = ref('');
          const selected_file = ref(null);
          const chunk_size_reprocessing = ref(false);
          const DEFAULT_SCANNER_URL = 'https://seyitegenn.github.io/202606-airgapped-qr/scanner.html';
          const scanner_url = ref(DEFAULT_SCANNER_URL);
          const url_locked = ref(true);
          const showing_scanner_qr = ref(false);

          let qrcode_object = null;

          const fnv32a = (str) => {
            let h = 0x811c9dc5;
            for (let i = 0; i < str.length; i++) {
              h ^= str.charCodeAt(i);
              h = (h * 0x01000193) >>> 0;
            }
            return h.toString(36);
          };

          const rebuild_qrcode = () => {
            const lowest_size = Math.min(window.innerWidth, window.innerHeight) / 1.3;
            document.getElementById('qrcode').innerHTML = '';
            qrcode_object = new QRCode('qrcode', {
              text: ' ',
              width: lowest_size,
              height: lowest_size,
              typeNumber: 40,
              colorDark: '#000000',
              colorLight: '#ffffff',
              correctLevel: QRCode.CorrectLevel[error_correction.value],
            });
          };

          const encode_data = (index, input_bytes) => {
            const encoded_string = String.fromCharCode.apply(null, input_bytes);
            const utf8_bytes = new TextEncoder().encode(encoded_string);
            return index + ',' + btoa(String.fromCharCode.apply(null, utf8_bytes));
          };

          const parse_range = (input, max_index) => {
            if (!input.trim()) return Array.from({ length: max_index + 1 }, (_, i) => i);
            const indices = new Set();
            input.split(',').forEach(part => {
              const range_match = part.trim().match(/^(\d+)-(\d+)$/);
              if (range_match) {
                const from = parseInt(range_match[1]);
                const to = Math.min(parseInt(range_match[2]), max_index);
                for (let i = from; i <= to; i++) indices.add(i);
              } else {
                const n = parseInt(part.trim());
                if (!isNaN(n) && n >= 0 && n <= max_index) indices.add(n);
              }
            });
            return Array.from(indices).sort((a, b) => a - b);
          };

          const process_file = async (file, chunk_size) => {
            const data_array = pako.gzip(await file.arrayBuffer(), { level: 9 });
            compressed_data.value = data_array;
            used_chunk_size.value = chunk_size;
            total_chunks_count.value = Math.ceil(data_array.length / chunk_size);
            chunk_range_input.value = `0-${total_chunks_count.value - 1}`;
            file_loaded.value = true;
          };

          const reset_file_state = () => {
            file_loaded.value = false;
            selected_file.value = null;
            compressed_data.value = null;
            total_chunks_count.value = 0;
            chunk_range_input.value = '';
            if (qrcode_object) qrcode_object.makeCode(' ');
          };

          const show_metadata_qr = () => {
            if (!selected_file.value || !file_loaded.value) return;
            const sid = fnv32a(`${selected_file.value.name}|${compressed_data.value.length}|${used_chunk_size.value}|${error_correction.value}`);
            const meta = { name: selected_file.value.name, chunks: total_chunks_count.value, sid };
            qrcode_object.makeCode(JSON.stringify(meta));
          };

          const handle_file = async (file) => {
            if (!file) return;
            reset_file_state();
            selected_file.value = file;
            await process_file(file, chunk_size_config.value);
            show_metadata_qr();
          };

          const on_file_selected = (event) => handle_file(event.target.files[0]);

          let drag_counter = 0;
          const on_drag_enter = () => { drag_counter++; is_dragging.value = true; };
          const on_drag_leave = () => { drag_counter--; if (drag_counter === 0) is_dragging.value = false; };
          const on_drop = (event) => {
            drag_counter = 0;
            is_dragging.value = false;
            const file = event.dataTransfer.files[0];
            if (!file) return;
            const dt = new DataTransfer();
            dt.items.add(file);
            document.getElementById('file_input').files = dt.files;
            handle_file(file);
          };

          watch(chunk_size_config, async (new_size) => {
            if (!selected_file.value || is_transferring.value) return;
            chunk_size_reprocessing.value = true;
            await process_file(selected_file.value, new_size);
            chunk_size_reprocessing.value = false;
            show_metadata_qr();
          });

          watch(error_correction, () => {
            rebuild_qrcode();
            if (file_loaded.value && !is_transferring.value) show_metadata_qr();
          });

          const render_scanner_qr = async () => {
            await Vue.nextTick();
            for (const id of ['scanner-qrcode-mobile', 'scanner-qrcode-desktop']) {
              const el = document.getElementById(id);
              if (!el) continue;
              el.innerHTML = '';
              new QRCode(id, {
                text: scanner_url.value.trim(),
                width: 180,
                height: 180,
                colorDark: '#000000',
                colorLight: '#ffffff',
                correctLevel: QRCode.CorrectLevel.M,
              });
            }
          };

          const reset_scanner_url = () => {
            scanner_url.value = DEFAULT_SCANNER_URL;
          };

          const toggle_scanner_qr = async () => {
            if (!scanner_url.value.trim()) return;
            showing_scanner_qr.value = !showing_scanner_qr.value;
            if (showing_scanner_qr.value) render_scanner_qr();
          };

          watch(scanner_url, () => {
            if (showing_scanner_qr.value && scanner_url.value.trim()) render_scanner_qr();
          });

          const stop_transfer = () => {
            is_transferring.value = false;
          };

          const start_transfer = async () => {
            if (!file_loaded.value) return;
            is_transferring.value = true;
            current_chunk_index.value = 0;

            const indices = parse_range(chunk_range_input.value, total_chunks_count.value - 1);
            const sid = fnv32a(`${selected_file.value.name}|${compressed_data.value.length}|${used_chunk_size.value}|${error_correction.value}`);
            const file_metadata = { name: selected_file.value.name, chunks: total_chunks_count.value, sid };

            qrcode_object.makeCode(JSON.stringify(file_metadata));
            await new Promise(r => setTimeout(r, 1000));

            for (const i of indices) {
              if (!is_transferring.value) break;
              current_chunk_index.value = i;
              await new Promise(r => setTimeout(r, chunk_delay_ms.value));
              const start = i * used_chunk_size.value;
              const chunk = compressed_data.value.subarray(start, start + used_chunk_size.value);
              qrcode_object.clear();
              qrcode_object.makeCode(encode_data(i, chunk));
            }

            if (is_transferring.value) {
              await new Promise(r => setTimeout(r, chunk_delay_ms.value));
              show_metadata_qr();
            }
            stop_transfer();
          };

          onMounted(() => {
            rebuild_qrcode();
            toggle_scanner_qr();
          });

          return {
            is_transferring,
            current_chunk_index,
            settings_open,
            is_dragging,
            on_drag_enter,
            on_drag_leave,
            on_drop,
            error_correction,
            chunk_delay_ms,
            chunk_size_config,
            chunk_size_reprocessing,
            file_loaded,
            total_chunks_count,
            chunk_range_input,
            scanner_url,
            showing_scanner_qr,
            selected_file,
            on_file_selected,
            start_transfer,
            stop_transfer,
            url_locked,
            reset_scanner_url,
            toggle_scanner_qr,
          };
        },
      }).mount('#app');
    </script>
  </body>
</html>
