<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <script src="https://cdn.tailwindcss.com"></script>
  </head>

  <body>
    <div id="app">
      <div class="flex min-h-screen">

        <!-- Main content -->
        <div class="flex flex-col items-center flex-1 py-4 px-4">
          <div class="text-xl my-4">Data Sender Mode</div>
          <div class="text-sm mb-4">{{user_message}}</div>

          <!-- File Input -->
          <div class="w-full max-w-md mb-4">
            <input
              class="block w-full text-sm text-gray-900 border border-gray-300 cursor-pointer bg-gray-50 focus:outline-none"
              id="file_input"
              type="file"
              @change="on_file_selected"
            />
          </div>

          <!-- Chunk selection (visible after file is loaded) -->
          <div v-if="file_loaded && !is_transferring" class="w-full max-w-md mb-4 text-sm">
            <label class="block mb-1 font-medium">
              Chunk Seçimi
              <span class="font-normal text-gray-500">(toplam: {{total_chunks_count}} chunk)</span>
            </label>
            <input
              v-model="chunk_range_input"
              placeholder="0-49  veya  3,7,15-20  — boş bırakılırsa tümü"
              class="border p-1 w-full font-mono text-xs"
            >
          </div>

          <!-- Buttons -->
          <button
            v-if="!is_transferring"
            v-on:click="start_transfer"
            :disabled="!file_loaded"
            class="mb-6 p-1 border-2 border-gray-500 disabled:opacity-40 disabled:cursor-not-allowed"
          >
            Start Transfer
          </button>
          <button
            v-else
            v-on:click="stop_transfer"
            class="mb-6 p-1 border-2 border-gray-500"
          >
            Stop Transfer
          </button>

          <!-- QR Code -->
          <div id="qrcode" class="mb-8"></div>
        </div>

        <!-- Config panel (right sidebar) -->
        <div class="w-60 shrink-0 border-l bg-gray-50 p-4 flex flex-col gap-5 text-sm">
          <div class="font-medium text-gray-700 border-b pb-2">Ayarlar</div>

          <div>
            <label class="block mb-1 font-medium">Hata Düzeltme</label>
            <select v-model="error_correction" :disabled="is_transferring" class="border p-1 w-full bg-white disabled:opacity-50">
              <option value="L">L — Kolay Okuma</option>
              <option value="M">M — Varsayılan</option>
              <option value="Q">Q — Dengeli</option>
              <option value="H">H — Dayanıklı</option>
            </select>
          </div>

          <div>
            <label class="block mb-1 font-medium">QR Arası Gecikme</label>
            <div class="flex items-center gap-2">
              <input type="range" v-model.number="chunk_delay_ms" min="20" max="500" step="10" class="flex-1">
              <input type="number" v-model.number="chunk_delay_ms" min="20" max="9999" step="10" class="border p-1 w-20 text-right text-xs">
              <span class="text-gray-500">ms</span>
            </div>
          </div>

          <div>
            <label class="block mb-1 font-medium">Chunk Boyutu</label>
            <div class="flex items-center gap-2">
              <input type="range" v-model.number="chunk_size_config" min="100" max="500" step="50" :disabled="is_transferring" class="flex-1 disabled:opacity-50">
              <span class="text-gray-500 w-14 text-right">{{chunk_size_config}}B</span>
            </div>
            <div v-if="chunk_size_reprocessing" class="text-xs text-blue-500 mt-1">Yeniden hesaplanıyor...</div>
          </div>

          <div class="border-t pt-4">
            <label class="block mb-1 font-medium">Scanner Bağlantısı</label>
            <div class="flex items-stretch mb-2">
              <button
                v-on:click="url_locked = !url_locked"
                :title="url_locked ? 'Düzenlemeyi aç' : 'Kilitle'"
                class="border border-r-0 px-1.5 hover:bg-gray-100 text-xs select-none leading-none"
                :class="url_locked ? 'text-gray-700' : 'text-gray-300'"
              >{{url_locked ? '🔒' : '🔓'}}</button>
              <button
                v-on:click="reset_scanner_url"
                title="Varsayılana sıfırla"
                class="border border-r-0 px-1.5 text-gray-400 hover:text-gray-700 hover:bg-gray-100 text-xs"
              >↺</button>
              <textarea
                v-model="scanner_url"
                :readonly="url_locked"
                placeholder="https://..."
                rows="2"
                :class="['border p-1 flex-1 text-xs min-w-0 resize-none leading-tight', url_locked ? 'text-gray-400 bg-gray-50' : 'text-gray-900 bg-white']"
              ></textarea>
            </div>
            <button
              v-on:click="toggle_scanner_qr"
              :disabled="!scanner_url.trim()"
              class="w-full p-1 border-2 border-gray-400 disabled:opacity-40 disabled:cursor-not-allowed"
            >
              {{showing_scanner_qr ? 'QR Gizle' : 'QR Göster'}}
            </button>
            <div v-if="showing_scanner_qr" class="mt-3 flex flex-col items-center">
              <div id="scanner-qrcode"></div>
            </div>
          </div>
        </div>

      </div>
    </div>

    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pako/2.0.3/pako.min.js"></script>
    <script>
      const { createApp, ref, watch, onMounted } = Vue;

      createApp({
        setup() {
          const user_message = ref('Dosya seçerek başlayın');
          const is_transferring = ref(false);

          // Config
          const error_correction = ref('M');
          const chunk_delay_ms = ref(250);
          const chunk_size_config = ref(250);

          // File state
          const compressed_data = ref(null);
          const file_loaded = ref(false);
          const total_chunks_count = ref(0);
          const used_chunk_size = ref(250);
          const chunk_range_input = ref('');
          const selected_file = ref(null);
          const chunk_size_reprocessing = ref(false);
          const DEFAULT_SCANNER_URL = 'https://seyitegenn.github.io/202606-airgapped-qr/';
          const scanner_url = ref(DEFAULT_SCANNER_URL);
          const url_locked = ref(true);
          const showing_scanner_qr = ref(false);

          let qrcode_object = null;

          const correct_level_map = {
            L: QRCode.CorrectLevel.L,
            M: QRCode.CorrectLevel.M,
            Q: QRCode.CorrectLevel.Q,
            H: QRCode.CorrectLevel.H,
          };

          const rebuild_qrcode = () => {
            const lowest_size = Math.min(window.innerWidth, window.innerHeight) / 1.5;
            document.getElementById('qrcode').innerHTML = '';
            qrcode_object = new QRCode('qrcode', {
              text: ' ',
              width: lowest_size,
              height: lowest_size,
              typeNumber: 40,
              colorDark: '#000000',
              colorLight: '#ffffff',
              correctLevel: correct_level_map[error_correction.value],
            });
          };

          const encode_data = (index, input_bytes) => {
            let encoded_string = String.fromCharCode.apply(null, input_bytes);
            let utf8Encoder = new TextEncoder();
            let utf8_bytes = utf8Encoder.encode(encoded_string);
            let encoded_data = btoa(String.fromCharCode.apply(null, utf8_bytes));
            return index + ',' + encoded_data;
          };

          const parse_range = (input, max_index) => {
            if (!input.trim()) return Array.from({ length: max_index + 1 }, (_, i) => i);
            const indices = new Set();
            input.split(',').forEach(part => {
              const range_match = part.trim().match(/^(\d+)-(\d+)$/);
              if (range_match) {
                const from = parseInt(range_match[1]);
                const to = Math.min(parseInt(range_match[2]), max_index);
                for (let i = from; i <= to; i++) indices.add(i);
              } else {
                const n = parseInt(part.trim());
                if (!isNaN(n) && n >= 0 && n <= max_index) indices.add(n);
              }
            });
            return Array.from(indices).sort((a, b) => a - b);
          };

          const process_file = async (file, chunk_size) => {
            const data_array = pako.gzip(await file.arrayBuffer(), { level: 9 });
            compressed_data.value = data_array;
            used_chunk_size.value = chunk_size;
            total_chunks_count.value = Math.ceil(data_array.length / chunk_size);
            chunk_range_input.value = `0-${total_chunks_count.value - 1}`;
            file_loaded.value = true;
          };

          const on_file_selected = async (event) => {
            const file = event.target.files[0];
            if (!file) return;
            selected_file.value = file;
            user_message.value = 'Dosya sıkıştırılıyor...';
            await process_file(file, chunk_size_config.value);
            user_message.value = `${total_chunks_count.value} chunk hazır. Chunk seçimi yapıp transfer başlatabilirsiniz.`;
          };

          // Chunk boyutu değişince dosyayı anında yeniden işle
          watch(chunk_size_config, async (new_size) => {
            if (!selected_file.value || is_transferring.value) return;
            chunk_size_reprocessing.value = true;
            await process_file(selected_file.value, new_size);
            chunk_size_reprocessing.value = false;
            user_message.value = `${total_chunks_count.value} chunk hazır. Chunk seçimi yapıp transfer başlatabilirsiniz.`;
          });

          const render_scanner_qr = async () => {
            await Vue.nextTick();
            document.getElementById('scanner-qrcode').innerHTML = '';
            new QRCode('scanner-qrcode', {
              text: scanner_url.value.trim(),
              width: 180,
              height: 180,
              colorDark: '#000000',
              colorLight: '#ffffff',
              correctLevel: QRCode.CorrectLevel.M,
            });
          };

          const reset_scanner_url = () => {
            scanner_url.value = DEFAULT_SCANNER_URL;
          };

          const toggle_scanner_qr = async () => {
            if (!scanner_url.value.trim()) return;
            showing_scanner_qr.value = !showing_scanner_qr.value;
            if (showing_scanner_qr.value) render_scanner_qr();
          };

          watch(scanner_url, () => {
            if (showing_scanner_qr.value && scanner_url.value.trim()) render_scanner_qr();
          });

          const stop_transfer = () => {
            is_transferring.value = false;
            user_message.value = file_loaded.value
              ? `${total_chunks_count.value} chunk hazır. Chunk seçimi yapıp transfer başlatabilirsiniz.`
              : 'Dosya seçerek başlayın';
          };

          const start_transfer = async () => {
            if (!file_loaded.value) return;
            is_transferring.value = true;

            rebuild_qrcode();

            const indices = parse_range(chunk_range_input.value, total_chunks_count.value - 1);
            const file_metadata = { name: selected_file.value.name, chunks: total_chunks_count.value };

            qrcode_object.makeCode(JSON.stringify(file_metadata));
            user_message.value = 'Transfer birkaç saniye içinde başlıyor...';
            await new Promise(r => setTimeout(r, 1000));

            for (const i of indices) {
              if (!is_transferring.value) break;
              await new Promise(r => setTimeout(r, chunk_delay_ms.value));
              const start = i * used_chunk_size.value;
              const chunk = compressed_data.value.subarray(start, start + used_chunk_size.value);
              qrcode_object.clear();
              qrcode_object.makeCode(encode_data(i, chunk));
              user_message.value = `Chunk ${i} / ${total_chunks_count.value - 1} gönderiliyor...`;
            }

            if (is_transferring.value) {
              user_message.value = 'Transfer tamamlandı.';
            }
            stop_transfer();
          };

          onMounted(() => {
            rebuild_qrcode();
            toggle_scanner_qr();
          });

          return {
            user_message,
            is_transferring,
            error_correction,
            chunk_delay_ms,
            chunk_size_config,
            chunk_size_reprocessing,
            file_loaded,
            total_chunks_count,
            chunk_range_input,
            scanner_url,
            showing_scanner_qr,
            on_file_selected,
            start_transfer,
            stop_transfer,
            DEFAULT_SCANNER_URL,
            url_locked,
            reset_scanner_url,
            toggle_scanner_qr,
          };
        },
      }).mount('#app');
    </script>
  </body>
</html>
